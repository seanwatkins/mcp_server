# Apache reverse proxy config for mcp-server
# Add these lines to your existing SSL VirtualHost
#
# Required modules:
#   sudo a2enmod proxy proxy_http
#   sudo systemctl reload apache2

# Exempt MCP and OAuth paths from Apache authentication
<LocationMatch "^/claude$|^/\.well-known/oauth|^/register$|^/authorize$|^/token$">
    Require all granted
</LocationMatch>

ProxyPreserveHost On

# OAuth infrastructure — Claude.ai discovers these at the server root
ProxyPass /.well-known/oauth-authorization-server http://claude:8765/.well-known/oauth-authorization-server
ProxyPass /.well-known/oauth-protected-resource   http://claude:8765/.well-known/oauth-protected-resource
ProxyPass /register  http://claude:8765/register
ProxyPass /authorize http://claude:8765/authorize
ProxyPassReverse /authorize http://claude:8765/authorize
ProxyPass /token     http://claude:8765/token

# MCP endpoint
ProxyPass /claude http://claude:8765/claude
ProxyPassReverse /claude http://claude:8765/claude
